<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Single-page app GitHub Pages redirect trick.
      // Strip the repo-name segment (1 segment) from the path, encode it as ?p=
      // and redirect to the root index.html so React Router can take over.
      var l = window.location;
      var segmentCount = 1;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/' +
        '?p=/' + l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
