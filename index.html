
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Physical Networking App Layout</title>
      <script>
        // Restore the path encoded by 404.html before React boots.
        (function(l) {
          if (l.search[1] === 'p') {
            var parts = l.search.slice(1).split('&');
            var path  = parts[0].slice(2).replace(/~and~/g, '&');
            var query = parts[1] ? '?' + parts[1].slice(2).replace(/~and~/g, '&') : '';
            window.history.replaceState(
              null, null,
              l.pathname.replace(/\/$/, '') + path + query + l.hash
            );
          }
        }(window.location));
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
